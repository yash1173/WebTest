<!DOCTYPE html>
<html>
<head>
<title>Auto Website Tester</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    text-align: center;
    padding: 40px;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    max-width: 600px;
    margin: auto;
}

input {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.card {
    background: #334155;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
.pass { color: #22c55e; }
.fail { color: #ef4444; }

img {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🚀 Auto Website Tester</h1>

<div class="container">
    <input id="url" placeholder="Website URL">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="test()">Test</button>

    <div id="output"></div>
</div>

<script>
async function test() {
    const url = document.getElementById("url").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    document.getElementById("output").innerHTML = "Testing...";

    const res = await fetch("/test", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, username, password })
    });

    const data = await res.json();

    let html = "";

    data.results.forEach(r => {
        html += `
        <div class="card">
            ${r.test} :
            <span class="${r.status === 'Passed' ? 'pass' : 'fail'}">
                ${r.status}
            </span>
            ${r.error ? `<div>${r.error}</div>` : ""}
        </div>`;
    });

    if (data.screenshot) {
        html += `<div class="card"><img src="${data.screenshot}"></div>`;
    }

    document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
